    <!-- Similar Cars -->

<script src="js/app.js"></script>
<script>
async function renderCarDetail() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const cars = await loadCars();
  const car = cars.find(c => c.id === id);

  if (!car) {
    document.getElementById('carDetail').innerHTML = `<div style="text-align:center;padding:80px;grid-column:1/-1"><h2>Voiture introuvable</h2><a href="voitures.html" class="btn btn-red" style="margin-top:20px">Voir toutes les voitures</a></div>`;
    return;
  }

  document.title = `${car.marque} ${car.modele} ${car.annee} — AutoMaroc`;
  document.getElementById('breadcrumbTitle').textContent = `${car.marque} ${car.modele}`;

  const t = translations[currentLang];
  const waMsg = `Bonjour, je suis intéressé par la ${car.marque} ${car.modele} ${car.annee} à ${formatPrice(car.prix)} DH. Pouvez-vous me donner plus d'informations ?`;

  const imgs = car.images;
  const thumbsHtml = imgs.length > 1
    ? imgs.map((src,i) => `<img src="${src}" class="thumb${i===0?' active':''}" onclick="changeImg('${src}',this)" alt="Photo ${i+1}">`).join('')
    : '';

  document.getElementById('carDetail').innerHTML = `
    <div>
      <img src="${imgs[0]}" alt="${car.marque} ${car.modele}" class="main-img" id="mainImg">
      ${thumbsHtml ? `<div class="thumb-row">${thumbsHtml}</div>` : ''}
    </div>
    <div class="car-detail-info">
      <div class="car-detail-brand">${car.marque}</div>
      <h1 class="car-detail-name">${car.modele}</h1>
      <div class="car-detail-year">${car.annee} · ${car.couleur} · ${car.ville}</div>
      <div class="car-detail-price">${formatPrice(car.prix)} <span>DH</span></div>
      <div class="specs-grid">
        <div class="spec-box">
          <div class="spec-box-label">Kilométrage</div>
          <div class="spec-box-value">${formatKm(car.km)} km</div>
        </div>
        <div class="spec-box">
          <div class="spec-box-label">Carburant</div>
          <div class="spec-box-value">${car.carburant}</div>
        </div>
        <div class="spec-box">
          <div class="spec-box-label">Boîte</div>
          <div class="spec-box-value">${car.boite}</div>
        </div>
        <div class="spec-box">
          <div class="spec-box-label">Année</div>
          <div class="spec-box-value">${car.annee}</div>
        </div>
      </div>
      <div class="detail-btns">
        <a href="https://wa.me/33646064391?text=${encodeURIComponent(waMsg)}" target="_blank" class="btn btn-whatsapp">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
          Je suis intéressé — WhatsApp
        </a>
        <a href="tel:+33646064391" class="btn btn-red">
          <svg width="20" height="20" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.62 4.4 2 2 0 0 1 3.59 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Appeler maintenant
        </a>
        <a href="voitures.html" class="btn" style="background:var(--gray-light);color:var(--black)">
          ← Retour aux voitures
        </a>
      </div>
      <div class="car-description">
        <h3>Description</h3>
        <p>${car.description}</p>
      </div>
    </div>
  `;

  // Similar cars
  const similar = cars.filter(c => c.id !== car.id && (c.marque === car.marque || Math.abs(c.prix - car.prix) < 30000)).slice(0,3);
  document.getElementById('similarCars').innerHTML = similar.map(renderCarCard).join('');
}

function changeImg(src, thumb) {
  document.getElementById('mainImg').src = src;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  thumb.classList.add('active');
}

renderCarDetail();
</script>
</body>
</html>
