<!-- MAIN CONTENT -->
<section>
  <div class="container">

    <!-- Advanced Filters -->
    <div style="background:var(--gray-light);border-radius:12px;padding:24px;margin-bottom:32px">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;align-items:end">
        <div class="search-field">
          <label>Marque</label>
          <select id="fBrand">
            <option value="">Toutes</option>
            <option>Dacia</option><option>Renault</option><option>Peugeot</option>
            <option>Volkswagen</option><option>Toyota</option><option>Hyundai</option>
            <option>Citroën</option><option>Ford</option>
          </select>
        </div>
        <div class="search-field">
          <label>Budget max</label>
          <select id="fBudget">
            <option value="">Tout</option>
            <option value="70000">70 000 DH</option>
            <option value="100000">100 000 DH</option>
            <option value="130000">130 000 DH</option>
            <option value="200000">200 000 DH</option>
          </select>
        </div>
        <div class="search-field">
          <label>Carburant</label>
          <select id="fFuel">
            <option value="">Tous</option>
            <option>Diesel</option><option>Essence</option><option>Hybride</option><option>Électrique</option>
          </select>
        </div>
        <div class="search-field">
          <label>Boîte</label>
          <select id="fBoite">
            <option value="">Toutes</option>
            <option>Manuelle</option><option>Automatique</option>
          </select>
        </div>
        <div class="search-field">
          <label>Trier par</label>
          <select id="fSort">
            <option value="recent">Plus récents</option>
            <option value="price-asc">Prix croissant</option>
            <option value="price-desc">Prix décroissant</option>
            <option value="km-asc">Km croissant</option>
          </select>
        </div>
        <button class="btn btn-red" onclick="applyFilters()" style="height:48px">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Filtrer
        </button>
        <button class="btn" onclick="resetFilters()" style="height:48px;background:var(--white);color:var(--gray);border:1.5px solid var(--border)">
          ✕ Reset
        </button>
      </div>
    </div>

    <!-- Quick filter pills -->
    <div class="filters-bar">
      <button class="filter-btn active" data-filter="all" onclick="quickFilter('all',this)">Toutes</button>
      <button class="filter-btn" data-filter="Diesel" onclick="quickFilter('Diesel',this)">Diesel</button>
      <button class="filter-btn" data-filter="Essence" onclick="quickFilter('Essence',this)">Essence</button>
      <button class="filter-btn" data-filter="Automatique" onclick="quickFilter('Automatique',this)">Automatique</button>
      <button class="filter-btn" data-filter="cheap" onclick="quickFilter('cheap',this)">Moins de 100k DH</button>
      <span class="results-count">Affichage de <strong id="resultCount">0</strong> voiture(s)</span>
    </div>

    <!-- Cars Grid -->
    <div class="cars-grid" id="carsGrid">
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
    </div>
  </div>
</section>

<script src="js/app.js"></script>
<script>
let allCars = [];
let activeQuickFilter = 'all';

async function renderCars() {
  allCars = await loadCars();
  readURLParams();
  applyFilters();
}

function readURLParams() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('brand')) document.getElementById('fBrand').value = p.get('brand');
  if (p.get('budget')) document.getElementById('fBudget').value = p.get('budget');
  if (p.get('fuel')) document.getElementById('fFuel').value = p.get('fuel');
  if (p.get('boite')) document.getElementById('fBoite').value = p.get('boite');
}

function applyFilters() {
  const brand = document.getElementById('fBrand').value;
  const budget = document.getElementById('fBudget').value;
  const fuel = document.getElementById('fFuel').value;
  const boite = document.getElementById('fBoite').value;
  const sort = document.getElementById('fSort').value;

  let filtered = allCars.filter(c => {
    if (brand && c.marque !== brand) return false;
    if (budget && c.prix > parseInt(budget)) return false;
    if (fuel && c.carburant !== fuel) return false;
    if (boite && c.boite !== boite) return false;
    if (activeQuickFilter === 'Diesel' && c.carburant !== 'Diesel') return false;
    if (activeQuickFilter === 'Essence' && c.carburant !== 'Essence') return false;
    if (activeQuickFilter === 'Automatique' && c.boite !== 'Automatique') return false;
    if (activeQuickFilter === 'cheap' && c.prix >= 100000) return false;
    return true;
  });

  if (sort === 'price-asc') filtered.sort((a,b) => a.prix - b.prix);
  else if (sort === 'price-desc') filtered.sort((a,b) => b.prix - a.prix);
  else if (sort === 'km-asc') filtered.sort((a,b) => a.km - b.km);

  const grid = document.getElementById('carsGrid');
  const count = document.getElementById('resultCount');
  count.textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div style="font-size:48px">🔍</div>
      <p>Aucune voiture ne correspond à vos critères.<br>
      <a href="#" onclick="resetFilters()" style="color:var(--red);font-weight:700">Réinitialiser les filtres</a></p>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(renderCarCard).join('');
  setTimeout(initScrollAnim, 100);
}

function resetFilters() {
  ['fBrand','fBudget','fFuel','fBoite'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fSort').value = 'recent';
  activeQuickFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  applyFilters();
}

function quickFilter(filter, btn) {
  activeQuickFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

renderCars();
</script>
</body>
